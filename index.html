<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Legion Teknologi - Email Sender</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#0f172a;
color:#fff;
display:flex;
justify-content:center;
padding:30px;

}

.container{

width:100%;
max-width:700px;
background:#1e293b;
border-radius:20px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.35);

}

.logo{

text-align:center;
margin-bottom:25px;

}

.logo h1{

font-size:28px;
color:#38bdf8;

}

.logo p{

margin-top:8px;
color:#94a3b8;

}

.card{

margin-top:20px;

}

label{

display:block;
margin-bottom:8px;
font-weight:bold;

}

input,select{

width:100%;
padding:14px;
border:none;
outline:none;
border-radius:10px;
margin-bottom:18px;
background:#334155;
color:white;

}

textarea{

width:100%;
height:120px;
padding:14px;
border:none;
outline:none;
border-radius:10px;
background:#334155;
color:white;
resize:none;

}

.btn{

margin-top:18px;
display:flex;
gap:10px;

}

button{

flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}

.preview{

background:#475569;
color:white;

}

.send{

background:#2563eb;
color:white;

}

.footer{

margin-top:25px;
text-align:center;
color:#94a3b8;
font-size:14px;

}

</style>

</head>
<body>

<div class="container">

<div class="logo">

<h1>📧 PT Legion Teknologi</h1>

<p>Email Sender Dashboard</p>

</div>

<div class="card">

<label>Sender</label>

<input
type="text"
value="PT Legion Teknologi <reyclouddev@gmail.com>"
readonly>

<label>To</label>

<input
type="email"
placeholder="example@gmail.com">

<label>Subject</label>

<input
type="text"
placeholder="Welcome to PT Legion Teknologi">

<label>Template</label>

<select>

<option>Register</option>

<option>Welcome</option>

<option>Reset Password</option>

<option>Invoice</option>

</select>

<label>Nama</label>

<input
type="text"
placeholder="Acil Suki">

<label>Role</label>

<input
type="text"
placeholder="Developer">

<label>Email</label>

<input
type="email"
placeholder="xenoprm45@gmail.com">

<label>WhatsApp</label>

<input
type="text"
placeholder="+62812xxxxxxxx">

<label>Catatan (Opsional)</label>

<textarea
placeholder="Tambahkan pesan jika diperlukan..."></textarea>

<div class="btn">

<button class="preview">
👁 Preview
</button>

<button class="send">
🚀 Send Email
</button>

</div>

</div>

<div class="footer">

PT Legion Teknologi © 2026

</div>

</div>

</body>
</html>
