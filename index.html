<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PT Legion Teknologi - Email Sender</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;

}

body{

background:#0f172a;
color:#fff;
padding:30px;
display:flex;
justify-content:center;

}

.container{

width:100%;
max-width:720px;
background:#1e293b;
border-radius:20px;
padding:25px;
box-shadow:0 10px 35px rgba(0,0,0,.35);

}

.logo{

text-align:center;
margin-bottom:25px;

}

.logo h1{

font-size:30px;
color:#38bdf8;

}

.logo p{

margin-top:8px;
color:#94a3b8;

}

.card{

margin-top:20px;

}

label{

display:block;
margin-bottom:8px;
font-weight:bold;
font-size:15px;

}

input,
select,
textarea{

width:100%;
padding:14px;
border:none;
outline:none;
border-radius:10px;
margin-bottom:18px;
background:#334155;
color:#fff;
font-size:15px;

}

textarea{

height:120px;
resize:none;

}

input:focus,
select:focus,
textarea:focus{

border:2px solid #38bdf8;

}

.info{

background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #334155;

}

.info p{

margin:6px 0;
color:#cbd5e1;

}

.row{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

.btn{

display:flex;
gap:15px;
margin-top:15px;

}

button{

flex:1;
padding:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:.3s;

}

.preview{

background:#475569;
color:white;

}

.preview:hover{

background:#64748b;

}

.send{

background:#2563eb;
color:white;

}

.send:hover{

background:#1d4ed8;

}

.footer{

margin-top:25px;
text-align:center;
font-size:14px;
color:#94a3b8;

}

@media(max-width:700px){

.row{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<h1>📧 PT Legion Teknologi</h1>

<p>Email Sender Dashboard</p>

</div>

<div class="info">

<p><b>Sender :</b> PT Legion Teknologi</p>

<p><b>Email :</b> reyclouddev@gmail.com</p>

<p><b>Status :</b> 🟢 Ready</p>

</div>

<div class="card">

<label>To</label>

<input
id="to"
type="email"
placeholder="example@gmail.com">

<label>Subject</label>

<input
id="subject"
type="text"
placeholder="Welcome to PT Legion Teknologi">

<label>Template</label>

<select id="template">

<option value="register">Register</option>

<option value="welcome">Welcome</option>

<option value="reset">Reset Password</option>

<option value="invoice">Invoice</option>

</select>

<div class="row">

<div>

<label>Nama Lengkap</label>

<input
id="name"
type="text"
placeholder="Acil Suki">

</div>

<div>

<label>Role / Jabatan</label>

<input
id="role"
type="text"
placeholder="Developer">

</div>

</div>

<div class="row">

<div>

<label>Email</label>

<input
id="email"
type="email"
placeholder="xenoprm45@gmail.com">

</div>

<div>

<label>Nomor WhatsApp</label>

<input
id="whatsapp"
type="text"
placeholder="+62812xxxxxxxx">

</div>

</div>

<label>Catatan</label>

<textarea
id="note"
placeholder="Tambahkan pesan jika diperlukan..."></textarea>
<div class="btn">

<button
type="button"
class="preview">

👁 Preview

</button>

<button
type="button"
class="send"
onclick="sendEmail()">

🚀 Send Email

</button>

</div>

</div>

<div class="footer">

<hr style="border:none;height:1px;background:#334155;margin:25px 0;">

<p><b>PT Legion Teknologi</b></p>

<p>Built in Indonesia, Trusted Worldwide.</p>

<br>

<p>📧 Sender : reyclouddev@gmail.com</p>

<p>🟢 Status : Ready</p>

<p style="margin-top:10px;">
© 2026 PT Legion Teknologi
</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
