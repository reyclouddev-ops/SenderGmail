<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PT Legion Teknologi - Email Sender</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header class="header">

<div class="brand">

<div class="logo">
🏢
</div>

<div>

<h1>PT Legion Teknologi</h1>

<p>Official Email Sender Dashboard</p>

</div>

</div>

<div class="status">

<span class="dot"></span>

SMTP Ready

</div>

</header>

<section class="info-card">

<div class="info-box">

<h3>📧 Sender</h3>

<p>reyclouddev@gmail.com</p>

</div>

<div class="info-box">

<h3>🏢 Company</h3>

<p>PT Legion Teknologi</p>

</div>

<div class="info-box">

<h3>📄 Templates</h3>

<p>4 Template</p>

</div>

<div class="info-box">

<h3>⚡ Status</h3>

<p>Online</p>

</div>

</section>

<form class="email-form">

<label>Penerima Email</label>

<input
id="to"
type="email"
placeholder="example@gmail.com">

<label>Template Email</label>

<select id="template">

<option value="register">
📋 Register
</option>

<option value="welcome">
👋 Welcome
</option>

<option value="invoice">
💳 Invoice
</option>

<option value="reset">
🔐 Reset Password
</option>

</select>

<div class="grid">

<div>

<label>Nama Lengkap</label>

<input
id="name"
type="text"
placeholder="Nama Lengkap">

</div>

<div>

<label>Role / Jabatan</label>

<input
id="role"
type="text"
placeholder="Developer">

</div>

</div>

<div class="grid">

<div>

<label>Email</label>

<input
id="email"
type="email"
placeholder="email@example.com">

</div>

<div>

<label>WhatsApp</label>

<input
id="whatsapp"
type="text"
placeholder="+62812xxxxxxxx">

</div>

</div>

<label>Catatan</label>

<textarea
id="note"
placeholder="Tulis catatan..."></textarea>

<div class="button-group">

<button
type="button"
class="preview"
onclick="previewEmail()">

👁 Preview

</button>

<button
type="button"
class="send"
onclick="sendEmail()">

🚀 Kirim Email

</button>

</div>

</form>

<footer>

<p>

© 2026 PT Legion Teknologi

</p>

<p>

Built in Indonesia, Trusted Worldwide.

</p>

</footer>

</div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal">

        <div class="modal-content">

            <div class="modal-header">

                <h3>📧 Preview Email</h3>

                <button onclick="closePreview()">
                    ✕
                </button>

            </div>

            <iframe id="previewFrame"></iframe>

        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast"></div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
